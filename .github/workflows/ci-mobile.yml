name: Mobile Build

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
    paths:
      - 'apps/mobile/**'
      - 'apps/web/**'
      - 'core/**'
      - 'integration/**'
      - 'packages/**'
      - 'packages/ui/**'
      - 'packages/screens/**'
      - 'packages/localization/**'
      - 'packages/theme/**'
      - 'packages/navigation/**'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'apps/web/**'
      - 'core/**'
      - 'integration/**'
      - 'packages/**'
      - 'packages/ui/**'
      - 'packages/screens/**'
      - 'packages/localization/**'
      - 'packages/theme/**'
      - 'packages/navigation/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

  android-prebuild:
    name: Android Prebuild
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate native projects
        run: |
          cd apps/mobile
          npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Upload Android project
        uses: actions/upload-artifact@v4
        with:
          name: android-project
          path: apps/mobile/android
          retention-days: 1

  android-build:
    name: Android Build (Debug)
    runs-on: ubuntu-latest
    needs: android-prebuild
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android project
        uses: actions/download-artifact@v4
        with:
          name: android-project
          path: apps/mobile/android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android Debug APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    needs: android-prebuild
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android project
        uses: actions/download-artifact@v4
        with:
          name: android-project
          path: apps/mobile/android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Android Lint
        run: |
          cd apps/mobile/android
          ./gradlew lint

  ios-prebuild:
    name: iOS Prebuild
    runs-on: macos-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate native projects
        run: |
          cd apps/mobile
          npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Upload iOS project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: apps/mobile/ios
          retention-days: 1

  ios-build:
    name: iOS Build (Debug)
    runs-on: macos-latest
    needs: ios-prebuild
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download iOS project
        uses: actions/download-artifact@v4
        with:
          name: ios-project
          path: apps/mobile/ios

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            apps/mobile/ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install CocoaPods
        run: |
          cd apps/mobile/ios
          pod install
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Build iOS (xcodebuild)
        run: |
          cd apps/mobile/ios
          xcodebuild -workspace Automatize.xcworkspace -scheme Automatize -configuration Debug -destination "platform=iOS Simulator,name=iPhone 15" build
        env:
          CI: true

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ~/Library/Developer/Xcode/DerivedData
          retention-days: 7

  mobile-typecheck:
    name: Mobile TypeScript Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm turbo run typecheck --filter=@automatize/mobile
