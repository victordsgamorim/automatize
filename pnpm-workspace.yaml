packages:
  # Apps
  - 'apps/mobile'
  - 'apps/web'
  - 'apps/windows'
  # Core
  - 'core/*'
  # Design system
  - 'packages/ui'
  # Navigation logic
  - 'packages/navigation'
  # Cross-platform screens (sign-in, forgot-password, content, settings)
  - 'packages/screens'
  # Form validation (Zod schemas + formatters)
  - 'packages/form-validator'
  # Integration — local infrastructure
  - 'integration/storage'
  - 'integration/sync'
  # Integration — Supabase ecosystem
  - 'integration/supabase/auth'
  # Localization
  - 'packages/localization'
  # Theme
  - 'packages/theme'
  # Tools
  - 'tools/eslint-config'
  - 'tools/tsconfig'

# ──────────────────────────────────────────────────────────────
# Dependency Catalogs — single source of truth for shared deps
# Usage in package.json:  "dep": "catalog:"  or  "dep": "catalog:<name>"
# ──────────────────────────────────────────────────────────────

catalog:
  # Runtime dependencies
  i18next: ^23.16.8
  react-i18next: ^15.0.0
  i18next-resources-to-backend: ^1.2.1
  zod: ^4.0.1
  ulid: ^2.3.0
  date-fns: ^3.2.0
  lucide-react: ^0.547.0
  react-native: ^0.82.0
  '@react-native-community/netinfo': ^11.3.1
  expo-constants: ^16.0.0
  expo-secure-store: ^13.0.0

  # Dev / build dependencies
  eslint: ^8.57.1
  typescript: ^5.9.3
  vite: ^6.3.5
  vitest: ^4.0.7
  '@vitest/coverage-v8': ^4.0.7
  tsup: ^8.3.0
  tsx: ^4.21.0
  '@types/react': ^18.3.0
  '@types/react-dom': ^18.3.0
  '@types/node': ^25.5.0
  '@testing-library/react': ^16.3.2
  '@testing-library/user-event': ^14.5.2

  '@tanstack/react-query': ^5.80.0

  # Additional dependencies (not yet cataloged)
  lucide-react-native: ^0.309.0
  expo-router: ^3.4.7
  next: ^16.2.0

# Named catalogs for React version split
# (Next.js 16 → React 19, React Native 0.73 → React 18)
catalogs:
  react18:
    react: 18.2.0
    react-dom: 18.2.0
  react19:
    react: ^19.0.0
    react-dom: ^19.0.0
