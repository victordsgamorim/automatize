packages:
  # Apps
  - 'apps/mobile'
  - 'apps/web'
  - 'apps/windows'
  # Core
  - 'core/*'
  # Design system
  - 'packages/ui'
  # Navigation logic
  - 'packages/navigation'
  # Sign-in (cross-platform screen + hook)
  - 'packages/sign-in'
  # Integration — local infrastructure
  - 'integration/storage'
  - 'integration/sync'
  # Integration — Supabase ecosystem
  - 'integration/supabase/auth'
  # Tools
  - 'tools/eslint-config'
  - 'tools/tsconfig'

# ──────────────────────────────────────────────────────────────
# Dependency Catalogs — single source of truth for shared deps
# Usage in package.json:  "dep": "catalog:"  or  "dep": "catalog:<name>"
# ──────────────────────────────────────────────────────────────

catalog:
  # Runtime dependencies
  zod: ^3.25.76
  ulid: ^2.3.0
  lucide-react: ^0.487.0
  react-native: ^0.73.2
  '@react-native-community/netinfo': ^11.3.1
  expo-constants: ^15.4.5
  expo-secure-store: ^12.8.1

  # Dev / build dependencies
  eslint: ^8.56.0
  typescript: ^5.9.0
  vitest: ^1.2.1
  '@vitest/coverage-v8': ^1.2.1
  tsup: ^8.0.1
  tsx: ^4.21.0
  '@types/react': ^18.3.0
  '@types/react-dom': ^18.3.0
  '@types/node': ^20.11.5
  '@testing-library/react': ^16.3.2

# Named catalogs for React version split
# (Next.js 15 → React 19, React Native 0.73 → React 18)
catalogs:
  react18:
    react: 18.2.0
    react-dom: 18.2.0
  react19:
    react: ^19.0.0
    react-dom: ^19.0.0
